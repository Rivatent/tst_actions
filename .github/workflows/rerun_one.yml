name: Rerun ONe job
on:
  push:
  workflow_dispatch:
jobs:
  # 1. Первая работа (входная точка)
  initial-check:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Step 1 Initial checks passed."

  # 2. Зависит от initial-check
  build-frontend:
    needs: [initial-check]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Step 2 Building frontend..."

  # 3. Тоже зависит от initial-check (идет параллельно с билдом)
  security-scan:
    needs: [initial-check]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Step 3 Scanning for vulnerabilities..."

  # 4. Зависит от того, чтобы и билд, и скан прошли успешно
  run-tests:
    needs: [build-frontend, security-scan]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Step 4 Running integration tests..."

  # 5. Финальный этап, ждет завершения тестов
  deploy:
    needs: [run-tests]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Step 5 Deploying to production! 🚀"
